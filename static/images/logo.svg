<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <!-- Background: transparent / placeholder outline -->
  <rect x="2" y="2" width="316" height="156" rx="12" ry="12"
        fill="none" stroke="#888" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- Crossed swords icon -->
  <g transform="translate(160,60)" stroke="#ccc" stroke-width="3" stroke-linecap="round">
    <!-- Sword 1 (top-left to bottom-right) -->
    <line x1="-30" y1="-28" x2="30" y2="28"/>
    <!-- Sword 1 guard -->
    <line x1="-10" y1="-8" x2="10" y2="-8" stroke-width="4"/>
    <!-- Sword 2 (top-right to bottom-left) -->
    <line x1="30" y1="-28" x2="-30" y2="28"/>
    <!-- Sword 2 guard -->
    <line x1="-10" y1="8" x2="10" y2="8" stroke-width="4"/>
  </g>

  <!-- Site name -->
  <text x="160" y="108"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        font-weight="bold"
        fill="#ddd"
        text-anchor="middle"
        letter-spacing="2">SWORD IN BOARD</text>

  <!-- Tagline -->
  <text x="160" y="132"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11"
        fill="#888"
        text-anchor="middle"
        letter-spacing="3">WORKSHOP</text>

  <!-- placeholder label -->
  <text x="160" y="150"
        font-family="monospace"
        font-size="8"
        fill="#555"
        text-anchor="middle"
        letter-spacing="1">[ placeholder logo ]</text>
</svg>
