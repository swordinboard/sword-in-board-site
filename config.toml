baseURL = "https://swordinboard.com"
languageCode = "en-us"
title = "Sword in Board Workshop"
theme = "careercanvas"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      tagline = "Web Developer & Parent Company"
      hero_description = "Sword in Board Workshop is the parent company for These Lucky Stars and the DBA behind various web development and side projects — building thoughtful, effective digital experiences."
      hero_location = "United States"
      collab_tags = ["Web Development", "Hugo Sites", "Netlify", "Side Projects"]
      resume_url = ""

[build]
  writeStats = true

[params]
  name = "Sword in Board Workshop"
  firstName = "Sword in Board"
  lastName = "Workshop"
  email = "hello@swordinboard.com"
  profile_image = "/images/sib-logo.png"
  author = "Sword in Board Workshop"
  og_image = "images/sib-og.png"
  description = "Sword in Board Workshop — parent company for These Lucky Stars and a web development studio for side projects and client work."
  linkedin_url = ""
  linkedin_text = ""
  github_url = "https://github.com/swordinboard"
  github_text = "github.com/swordinboard"
  calendly_url = ""
  copyright = "© 2025 Sword in Board Workshop"
  resume_url_en = ""
  resume_label = "Portfolio"
  sectionPagesMenu = "main"
  formspreeendpoint = ""
  pexelsapikey = ""

  [[params.social]]
    icon = "github"
    url = "https://github.com/swordinboard"

[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[server]
  [[server.headers]]
    for = "/**/*.css"
    [server.headers.values]
      Content-Type = "text/css"

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$']

[params.color_palettes]
  [[params.color_palettes.palette]]
    name = "forge"
    main_color = "#1a1a2e"
    second_color = "#c0392b"
    third_color = "#e67e22"
  [[params.color_palettes.palette]]
    name = "steel"
    main_color = "#2c3e50"
    second_color = "#e74c3c"
    third_color = "#f39c12"
  [[params.color_palettes.palette]]
    name = "night"
    main_color = "#0d1b2a"
    second_color = "#c0392b"
    third_color = "#27ae60"

[params.pexels]
  queries = ["blacksmith forge", "workshop tools", "dark metal texture"]
